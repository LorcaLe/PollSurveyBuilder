services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: psb-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Lorcale2711@"
    ports:
      - "2433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: psb-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/PollSurveyBuilder.API/Dockerfile
    container_name: psb-api
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development" 
      DatabaseProvider: "SqlServer"
      ConnectionStrings__Default: "Server=sqlserver;Database=PollSurveyBuilder;User Id=sa;Password=Lorcale2711@;TrustServerCertificate=True"
      ConnectionStrings__Redis: "redis:6379"
      Jwt__Issuer: "PollSurveyBuilder"
      Jwt__Audience: "PollSurveyBuilder.Client"
      Jwt__Key: "CHANGE_ME_to_a_long_random_secret_at_least_32_chars"
      Cors__AllowedOrigins__0: "http://localhost:5173"
    ports:
      - "5080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:5080"
    container_name: psb-frontend
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  sqlserver-data:
